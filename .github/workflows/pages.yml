name: Deploy schema.bra0.org

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check ontology quality gate whitelist
        id: whitelist
        run: |
          count=$(grep -v '^#' docs-published.txt 2>/dev/null | grep -v '^$' | wc -l || echo 0)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Whitelist entries: $count"

      - name: Stage site output
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site

          # Carry CNAME and landing page
          cp CNAME _site/
          cp index.html _site/

          # Publication loop — copy each whitelisted TTL to _site
          if [ "${{ steps.whitelist.outputs.count }}" != "0" ]; then
            while IFS=';' read -r ttl_path badge audit_path publish_date; do
              [ -z "$ttl_path" ] && continue
              [[ "$ttl_path" =~ ^# ]] && continue
              echo "==> Publishing $ttl_path [$badge]"
              if [ ! -f "$ttl_path" ]; then
                echo "::error::Whitelisted TTL missing: $ttl_path"
                exit 1
              fi
              dir="$(dirname "$ttl_path")"
              mkdir -p "_site/${dir}"
              cp "$ttl_path" "_site/${dir}/"
            done < <(grep -v '^#' docs-published.txt | grep -v '^$')
          else
            echo "Bootstrap phase: no ontologies whitelisted."
          fi

          # Copy audit artifacts (publicly linkable)
          if [ -d audit ]; then
            cp -R audit _site/audit
          fi

          echo "==> Site staged:"
          find _site -type f | sort

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
