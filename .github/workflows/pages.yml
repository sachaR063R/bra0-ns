name: Deploy schema.bra0.org

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pyLODE
        run: |
          set -euo pipefail
          pip install pylode==3.4.2
          # ADR-058 §2.8 workaround — pyLODE 3.4.2 ships without a pyproject.toml
          # at site-packages root and crashes on Python 3.13. Stub it.
          py_site="$(python -c 'import site, sys; print(site.getsitepackages()[0])')"
          if [ ! -f "${py_site}/pyproject.toml" ]; then
            cat > "${py_site}/pyproject.toml" <<'EOF'
          [project]
          name = "pylode"
          version = "3.4.2"
          EOF
          fi

      - name: Check ontology quality gate whitelist
        id: whitelist
        run: |
          count=$(grep -v '^#' docs-published.txt 2>/dev/null | grep -v '^$' | wc -l || echo 0)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Whitelist entries: $count"

      - name: Stage site output
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site

          # Carry CNAME and root landing page
          cp CNAME _site/
          cp index.html _site/

          if [ "${{ steps.whitelist.outputs.count }}" != "0" ]; then
            python .github/scripts/build_namespace_landings.py
          else
            echo "Bootstrap phase: no ontologies whitelisted."
          fi

          # Copy audit artifacts (publicly linkable)
          if [ -d audit ]; then
            cp -R audit _site/audit
          fi

          echo "==> Site staged:"
          find _site -type f | sort

      - name: BMAD-leak grep gate (portability-checklist v1.1)
        run: |
          set -euo pipefail
          # ADR-058 §4 + portability-checklist v1.1 — fail if internal vocabulary
          # leaks to public surface. Patterns are word-bounded so legitimate
          # ontology terms like "Adapts" or "Adaptive" do not collide with
          # agent handle "Ada".
          # Two pattern groups:
          #   (a) unique BMAD/internal vocabulary that is unambiguous
          #   (b) agent handles (Title-cased) — matched only when not part of a longer word
          if grep -REn -P '\b(BMAD|Co-STORM|costorm|bmad-master|Devon|Kokoro|SandrAI|Co-Authored-By: Claude|Generated with Claude)\b|\b(Nael|Sarah|Ada|Quinn|Jake|Noam|Athena|Diana)\b(?![A-Za-z])' _site/ ; then
            echo "::error::BMAD vocabulary leaked into public _site/ — see matches above."
            exit 1
          fi
          echo "✓ Public surface clean of BMAD vocabulary."

      - name: E2E probe (local _site/)
        run: bash .github/scripts/probe-iris.sh local

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
