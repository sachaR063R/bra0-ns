name: Deploy schema.bra0.org

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pyLODE
        run: |
          set -euo pipefail
          pip install pylode==3.4.2
          # ADR-058 §2.8 workaround — pyLODE 3.4.2 ships without a pyproject.toml
          # at site-packages root and crashes on Python 3.13. Stub it.
          py_site="$(python -c 'import site, sys; print(site.getsitepackages()[0])')"
          if [ ! -f "${py_site}/pyproject.toml" ]; then
            cat > "${py_site}/pyproject.toml" <<'EOF'
          [project]
          name = "pylode"
          version = "3.4.2"
          EOF
          fi

      - name: Check ontology quality gate whitelist
        id: whitelist
        run: |
          count=$(grep -v '^#' docs-published.txt 2>/dev/null | grep -v '^$' | wc -l || echo 0)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Whitelist entries: $count"

      - name: Stage site output
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site

          if [ "${{ steps.whitelist.outputs.count }}" != "0" ]; then
            python .github/scripts/build_namespace_landings.py
          else
            echo "Bootstrap phase: no ontologies whitelisted."
          fi

          # Carry CNAME and apex landing page AFTER the python builder runs:
          # build_namespace_landings.py wipes _site/ at start (idempotency
          # guard, Diana R2 #3 lift 2026-04-28), so any apex artifacts must
          # be staged post-script. Same pattern as audit/ below.
          cp CNAME _site/
          cp index.html _site/

          # Copy audit artifacts (publicly linkable)
          if [ -d audit ]; then
            cp -R audit _site/audit
          fi

          echo "==> Site staged:"
          find _site -type f | sort

      - name: BMAD-leak grep gate C1 (portability-checklist v1.2 — roster + session vocab)
        run: |
          set -euo pipefail
          # portability-checklist v1.2 §C1 — fail if internal vocabulary
          # leaks to public surface. Patterns are word-bounded so legitimate
          # ontology terms like "Adapts" or "Adaptive" do not collide with
          # agent handle "Ada".
          # Two pattern groups:
          #   (a) unique BMAD/internal vocabulary that is unambiguous
          #   (b) agent handles (Title-cased) — matched only when not part of a longer word
          if grep -REn -P '\b(BMAD|Co-STORM|costorm|bmad-master|Devon|Kokoro|SandrAI|Co-Authored-By: Claude|Generated with Claude)\b|\b(Nael|Sarah|Ada|Quinn|Jake|Noam|Athena|Diana|Calliope)\b(?![A-Za-z])' _site/ ; then
            echo "::error::BMAD roster/session vocabulary leaked into public _site/ — see matches above (C1)."
            exit 1
          fi
          echo "✓ Public surface clean of BMAD roster + session vocabulary (C1)."

      - name: BMAD-leak grep gate C2 (portability-checklist v1.2 — internal-governance trail)
        run: |
          set -euo pipefail
          # portability-checklist v1.2 §C2 — fail if internal-governance trail
          # jargon leaks into TTL headers, rdfs:comment / dcterms:description
          # literals, static landings, or apex index.html.
          # Catches: ADR-NNN refs, Q-α/β arbitration markers, W-cycle / D-code
          # milestones, personal collaborator names, internal doctrine codes.
          # Reference: 2026-04-27 cleanup cycle (bra0_meta b4a8c95, bra0-ns 6625461).
          if grep -REn -P '\bADR-[0-9]+\b|Q-[αβγ]|\bW0[1-9]\b|\bW1[0-3]\b|\bD[0-9]+(\.[0-9]+)?\b|\b(Magali|Adrien|Akram|Didier|OpenClaw)\b|\bP[0-9]/P[0-9]+\b' _site/ ; then
            echo "::error::Internal-governance trail leaked into public _site/ — see matches above (C2)."
            exit 1
          fi
          echo "✓ Public surface clean of internal-governance trail (C2)."

      - name: omyn.ai/schema rupture-sèche gate (ADR-060)
        run: |
          set -euo pipefail
          # ADR-060 — edgy + retroeng migrated to schema.bra0.org/cross-domain/*.
          # Rupture sèche policy: NO IRI of the form omyn.ai/schema/{edgy,retroeng}
          # may appear anywhere in the published _site/. Any regression fails CI.
          if grep -REn 'omyn\.ai/schema/(edgy|retroeng)' _site/ ; then
            echo "::error::Public surface still references omyn.ai/schema/{edgy,retroeng} — see matches above. ADR-060 violated."
            exit 1
          fi
          echo "✓ Public surface clean of omyn.ai/schema/{edgy,retroeng} legacy IRIs."

      - name: E2E probe (local _site/)
        run: bash .github/scripts/probe-iris.sh local

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
